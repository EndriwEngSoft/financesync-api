# ============================================
# KUBERNETES SECRET
# ============================================
# Secret armazena dados SENSÍVEIS:
# - Senhas
# - Tokens (JWT)
# - API Keys
#
# Em produção: usar Vault, AWS Secrets Manager
# Aqui é apenas exemplo para desenvolvimento
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: financesync-secret
  namespace: financesync
  labels:
    app: financesync
type: Opaque
stringData:
  # ===== DATABASE PASSWORD =====
  DB_PASSWORD: "123456"
  POSTGRES_PASSWORD: "123456"

  # ===== JWT SECURITY =====
  JWT_SECRET: "financesync-secret-key-super-segura-para-desenvolvimento-2026"
  JWT_EXPIRATION: "86400000"
