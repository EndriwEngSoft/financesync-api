# ============================================
# KUBERNETES CONFIGMAP
# ============================================
# ConfigMap armazena variáveis de ambiente
# NÃO-sensíveis (públicas)
#
# Diferença:
# - ConfigMap: valores públicos (nomes, portas)
# - Secret: valores privados (senhas, tokens)
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: financesync-config
  namespace: financesync
  labels:
    app: financesync
data:
  # ===== DATABASE =====
  # DB_* é o padrão que a aplicação Spring Boot consome
  # (definido em application.properties via ${DB_HOST}, ${DB_USER}, etc.)
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "financesync_db"
  DB_USER: "postgres"

  # POSTGRES_* é exigido pela IMAGEM OFICIAL do postgres (não é escolha
  # nossa — é o nome fixo que o entrypoint da imagem espera pra
  # inicializar o banco). Duplicação intencional: dois consumidores
  # diferentes (imagem postgres vs. Spring Boot) leem o mesmo valor
  # sob nomes diferentes. Se DB_NAME ou DB_USER mudar, atualize
  # POSTGRES_DB / POSTGRES_USER junto.
  POSTGRES_DB: "financesync_db"
  POSTGRES_USER: "postgres"

  # ===== SERVER =====
  SERVER_PORT: "8080"
  SERVER_SERVLET_CONTEXT_PATH: "/api"

  # ===== JPA/HIBERNATE =====
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_SHOW_SQL: "true"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"