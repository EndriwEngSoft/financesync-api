# ============================================
# KUBERNETES DEPLOYMENT: PostgreSQL
# ============================================
# Deployment gerencia Pods (containers)
# Garante que o Pod está sempre rodando
# Se cair, reinicia automaticamente
# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: financesync
  labels:
    app: postgres
spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres
    spec:
      # Nem o Postgres nem a app falam com a API do Kubernetes,
      # então não precisam do token de ServiceAccount montado no Pod.
      # Reduz superfície de ataque caso o container seja comprometido.
      automountServiceAccountToken: false

      containers:
        - name: postgres
          image: postgres:16-alpine

          ports:
            - containerPort: 5432
              name: db

          env:
            - name: POSTGRES_INITDB_ARGS
              value: "-c max_connections=200"

          envFrom:
            - configMapRef:
                name: financesync-config
            - secretRef:
                name: financesync-secret

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
              ephemeral-storage: "500Mi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "1Gi"

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc