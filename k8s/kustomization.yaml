# ============================================
# KUBERNETES KUSTOMIZATION
# ============================================
# Kustomize agrupa vários YAML files
# Permite aplicar todos com um único comando:
#   kubectl apply -k k8s/
#
# Alternativa: kubectl apply -f k8s/
# ============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: financesync

resources:
- namespace.yaml
- configmap.yaml
- secret.yaml
- postgres-deployment.yaml
- postgres-service.yaml
- app-deployment.yaml
- app-service.yaml
